# ==================== 服务配置 ====================
server:
  mode: "${MCP_TRANSPORT:-stdio}"
  host: "0.0.0.0"
  port: ${MCP_PORT:-8000}

# ==================== LLM 配置 ====================
llm:
  provider: "${LLM_PROVIDER:-qianfan}"
  qianfan:
    # 千帆 API 配置
    # Coding Plan 获取地址: https://qianfan.baidubce.com/v2/coding
    api_key: "${LLM_API_KEY}"
    secret_key: "${LLM_SECRET_KEY}"
    # 可选: 自定义 base_url (Coding Plan 需要设置)
    base_url: "${LLM_BASE_URL:-https://qianfan.baidubce.com/v2}"
    # 模型列表: https://console.bce.baidu.com/qianfan/modelcenter
    model: "${LLM_MODEL:-ERNIE-Bot-4}"
    temperature: 0.7
    max_tokens: 2048

# ==================== 嵌入模型配置 ====================
embedding:
  provider: "${EMBEDDING_PROVIDER:-siliconflow}"
  siliconflow:
    # SiliconFlow API 配置
    # 控制台: https://cloud.siliconflow.cn
    api_key: "${EMBEDDING_API_KEY}"
    # 可选: 自定义 base_url
    base_url: "${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}"
    # 可选: 自定义模型 (默认 BAAI/bge-large-zh-v1.5)
    model: "${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}"

# ==================== 向量数据库配置 ====================
vector_store:
  provider: "${VECTOR_DB_PROVIDER:-chroma}"
  chroma:
    persist_directory: "${VECTOR_DB_PERSIST_DIR:-./data/chroma_db}"
    collection_name: "knowledge_base"
    distance_fn: "cosine"

# ==================== 检索配置 ====================
retrieval:
  strategy: hybrid
  top_k: 10
  hybrid:
    vector_weight: 0.7
    bm25_weight: 0.3
    fusion_mode: rrf

# ==================== 重排序配置 ====================
reranker:
  enabled: true
  provider: "${RERANKER_PROVIDER:-siliconflow}"
  siliconflow:
    # SiliconFlow API 配置
    api_key: "${RERANKER_API_KEY}"
    # 可选: 自定义 base_url
    base_url: "${RERANKER_BASE_URL:-https://api.siliconflow.cn/v1}"
    # 可选: 自定义重排序模型
    model: "${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}"
    top_n: 5

# ==================== 文档处理配置 ====================
ingestion:
  supported_extensions: [".txt", ".md", ".pdf", ".docx", ".xlsx", ".xls"]
  knowledge_base_dir: "${KNOWLEDGE_BASE_DIR:-./knowledge_base}"
  splitter:
    strategy: semantic
    semantic:
      buffer_size: 1
      breakpoint_percentile_threshold: 95
    recursive:
      chunk_size: 512
      chunk_overlap: 50
  office:
    excel:
      max_rows_per_sheet: 10000
      date_format: "%Y-%m-%d"
    word:
      extract_tables: true
      include_headers: false

# ==================== 评估配置 ====================
evaluation:
  enabled: true
  metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall

# ==================== 日志配置 ====================
logging:
  level: "${LOG_LEVEL:-INFO}"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/rag-mcp.log"
