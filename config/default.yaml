# ==================== 服务配置 ====================
server:
  mode: stdio
  host: "0.0.0.0"
  port: 8000

# ==================== LLM 配置 ====================
llm:
  provider: qianfan
  qianfan:
    # 千帆 API 配置
    # Coding Plan 获取地址: https://qianfan.baidubce.com/v2/coding
    api_key: "${QIANFAN_API_KEY}"
    secret_key: "${QIANFAN_SECRET_KEY}"
    # 可选: 自定义 base_url (Coding Plan 需要设置)
    base_url: "${QIANFAN_BASE_URL:-https://qianfan.baidubce.com/v2}"
    # 模型列表: https://console.bce.baidu.com/qianfan/modelcenter
    model: "${QIANFAN_MODEL:-ERNIE-Bot-4}"
    temperature: 0.7
    max_tokens: 2048

# ==================== 嵌入模型配置 ====================
embedding:
  provider: siliconflow
  siliconflow:
    # SiliconFlow API 配置
    # 控制台: https://cloud.siliconflow.cn
    api_key: "${SILICONFLOW_API_KEY}"
    # 可选: 自定义 base_url
    base_url: "${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}"
    # 可选: 自定义模型 (默认 BAAI/bge-large-zh-v1.5)
    model: "${SILICONFLOW_EMBED_MODEL:-BAAI/bge-large-zh-v1.5}"

# ==================== 向量数据库配置 ====================
vector_store:
  provider: chroma
  chroma:
    persist_directory: "./data/chroma_db"
    collection_name: "knowledge_base"
    distance_fn: "cosine"

# ==================== 检索配置 ====================
retrieval:
  strategy: hybrid
  top_k: 10
  hybrid:
    vector_weight: 0.7
    bm25_weight: 0.3
    fusion_mode: rrf

# ==================== 重排序配置 ====================
reranker:
  enabled: true
  siliconflow:
    # SiliconFlow API 配置 (可与嵌入使用相同或不同的 key)
    api_key: "${SILICONFLOW_API_KEY}"
    # 可选: 自定义 base_url
    base_url: "${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}"
    # 可选: 自定义重排序模型
    model: "${SILICONFLOW_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}"
    top_n: 5

# ==================== 文档处理配置 ====================
ingestion:
  supported_extensions: [".txt", ".md", ".pdf", ".docx", ".xlsx", ".xls"]
  splitter:
    strategy: semantic
    semantic:
      buffer_size: 1
      breakpoint_percentile_threshold: 95
    recursive:
      chunk_size: 512
      chunk_overlap: 50
  office:
    excel:
      max_rows_per_sheet: 10000
      date_format: "%Y-%m-%d"
    word:
      extract_tables: true
      include_headers: false

# ==================== 评估配置 ====================
evaluation:
  enabled: true
  metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall

# ==================== 日志配置 ====================
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/rag-mcp.log"
